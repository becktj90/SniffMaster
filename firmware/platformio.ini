[platformio]
default_envs = xiao_esp32c3

[env:xiao_esp32c3]
platform = espressif32@6.5.0
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
upload_speed = 460800                    # ⚠️ Changed — 921600 is too fast for C3
board_build.filesystem = littlefs
board_build.partitions = huge_app.csv    # ✅ Added — gives more app/TLS space
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER   # ✅ Added — limits BLE to save RAM
  -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1  # ✅ Added — saves RAM
lib_deps =
  bblanchon/ArduinoJson @ ^7.0.4
  adafruit/Adafruit SSD1306 @ ^2.5.11
  adafruit/Adafruit GFX Library @ ^1.11.9
  adafruit/Adafruit BusIO @ ^1.16.1
  adafruit/Adafruit NeoPixel @ ^1.12.2
  h2zero/NimBLE-Arduino @ ^1.4.2
  boschsensortec/bsec2 @ ^1.8.2610
  boschsensortec/BME68x Sensor library @ ^1.1.40407

# ── Seeed XIAO ESP32-C2 ──────────────────────────────────────────────────────
# ESP32-C2 has no BLE, so NimBLE is excluded. I2C pins must be set explicitly
# in firmware (SDA=GPIO6, SCL=GPIO7) — Wire.begin() defaults differ on C2.
[env:xiao_esp32c2]
platform = espressif32@6.5.0
board = seeed_xiao_esp32c2
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.filesystem = littlefs
board_build.partitions = huge_app.csv
build_flags =
  -DCORE_DEBUG_LEVEL=3
lib_deps =
  bblanchon/ArduinoJson @ ^7.0.4
  adafruit/Adafruit SSD1306 @ ^2.5.11
  adafruit/Adafruit GFX Library @ ^1.11.9
  adafruit/Adafruit BusIO @ ^1.16.1
  adafruit/Adafruit NeoPixel @ ^1.12.2
  boschsensortec/bsec2 @ ^1.8.2610
  boschsensortec/BME68x Sensor library @ ^1.1.40407
